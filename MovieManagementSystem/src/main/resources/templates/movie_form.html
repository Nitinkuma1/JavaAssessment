<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Form</title>
    <meta charset="UTF-8">
</head>
<body>

<h2 th:text="${movie.id == null} ? 'Add Movie' : 'Edit Movie'"></h2>

<form th:action="@{/movie/save}" th:object="${movie}" method="post">

    <!-- Hidden ID for Update -->
    <input type="hidden" th:field="*{id}" />

    <label>Title:</label>
    <input type="text" th:field="*{title}" required>
    <br><br>

    <label>Genre:</label>
    <input type="text" th:field="*{genre}" required>
    <br><br>

    <label>Director:</label>
    <input type="text" th:field="*{director}" required>
    <br><br>

    <label>Release Year:</label>
    <input type="number" th:field="*{releaseyear}" required>
    <br><br>

    <label>Rating (0-10):</label>
    <input type="number" step="0.1" min="0" max="10"
           th:field="*{rating}" required>
    <br><br>

    <!-- Save / Update Button -->
    <button type="submit"
            th:text="${movie.id == null} ? 'Save Movie' : 'Update Movie'">
    </button>

</form>

<!-- Delete Button (Only When Editing) -->
<div th:if="${movie.id != null}">
    <br>
    <a th:href="@{/movie/delete/{id}(id=${movie.id})}">
        <button style="color:red;">Delete Movie</button>
    </a>
</div>

<br>
<a th:href="@{/movie/all}">Back to List</a>

</body>
</html>
