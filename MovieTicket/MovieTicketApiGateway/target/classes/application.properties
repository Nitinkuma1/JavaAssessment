spring.application.name=BookingServiceApiGateway
# Gateway port
server.port=8080

# Eureka server configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.server.webflux.routes[0].id=movie-service
 spring.cloud.gateway.server.webflux.routes[0].uri=lb://MOVIESERVICE
  spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/movies/**
  
  spring.cloud.gateway.server.webflux.routes[1].id=booking-service
 spring.cloud.gateway.server.webflux.routes[1].uri=lb://BOOKINGSERVICE
  spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/bookings/**